# Configuration for Alacritty, the GPU enhanced terminal emulator.
# Any items in the `env` entry below will be added as
# environment variables. Some entries may override variables
# set by alacritty itself.
env:
  # TERM: alacritty
  LANG: "en_US.UTF-8"
  LC_CTYPE: en_US.UTF-8
# Font configuration
terminal:
  osc52: "CopyPaste"
font:
  # Normal (roman) font face
  normal:
    family: "JetBrainsMono Nerd Font"
    style: Regular
  bold:
    family: "JetBrainsMono Nerd Font"
    style: Bold
  italic:
    family: "JetBrainsMono Nerd Font"
    style: Italic
  bold_italic:
    family: "JetBrainsMono Nerd Font"
    style: Bold Italic
  # Point size
  size: 13.0
# Colors (Tomorrow Night Bright)
schemes:
  tomorrow_night: &tomorrow_night
    primary: # Default colors
      background: "#282828"
      foreground: "#d8d8d8"
    # Colors the cursor will use if `custom_cursor_colors` is true
    cursor:
      text: "#0a0a0a"
      cursor: "#d8d8d8"
    # Normal colors
    normal:
      black: "#181818"
      red: "#ab4642"
      green: "#a1b56c"
      yellow: "#f7ca88"
      blue: "#7cafc2"
      magenta: "#ba8baf"
      cyan: "#86c1b9"
      white: "#d8d8d8"
    # Bright colors
    bright:
      black: "#585858"
      red: "#ab4642"
      green: "#a1b56c"
      yellow: "#f7ca88"
      blue: "#7cafc2"
      magenta: "#ba8baf"
      cyan: "#86c1b9"
      white: "#f8f8f8"
  my_theme: &my_theme
    primary:
      background: "#1d1d1d"
      foreground: "#c0c0c0"
    normal:
      black: "#212121"
      red: "#d75f5f"
      green: "#a1b56c"
      yellow: "#dab997"
      blue: "#83adad"
      magenta: "#fa4a43"
      cyan: "#89b482"
      white: "#f8f8f8"
    bright:
      black: "#212121"
      red: "#d75f5f"
      green: "#a1b56c"
      yellow: "#dab997"
      blue: "#83adad"
      magenta: "#fa4a43"
      cyan: "#89b482"
      white: "#f8f8f8"
colors: *my_theme
