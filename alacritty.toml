[colors.bright]
black = "#212121"
blue = "#83adad"
cyan = "#89b482"
green = "#a1b56c"
magenta = "#fa4a43"
red = "#d75f5f"
white = "#f8f8f8"
yellow = "#dab997"

[colors.normal]
black = "#212121"
blue = "#83adad"
cyan = "#89b482"
green = "#a1b56c"
magenta = "#fa4a43"
red = "#d75f5f"
white = "#f8f8f8"
yellow = "#dab997"

[colors.primary]
background = "#1d1d1d"
foreground = "#c0c0c0"

[env]
LANG = "en_US.UTF-8"
LC_CTYPE = "en_US.UTF-8"

[font]
size = 13.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[terminal]
osc52 = "CopyPaste"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"
